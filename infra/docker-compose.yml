version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: clawdbot
      POSTGRES_PASSWORD: clawdbot
      POSTGRES_DB: clawdbot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clawdbot"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: ..
      dockerfile: infra/Dockerfile.migrate
    command: ["python", "-m", "alembic", "-c", "infra/alembic.ini", "upgrade", "head"]
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://clawdbot:clawdbot@db:5432/clawdbot
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://clawdbot:clawdbot@db:5432/clawdbot
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://clawdbot:clawdbot@db:5432/clawdbot
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  bot:
    build:
      context: ..
      dockerfile: apps/bot/Dockerfile
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://clawdbot:clawdbot@db:5432/clawdbot
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata:
