[project]
name = "connectors"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "core",
    "google-auth>=2.29",
    "google-auth-oauthlib>=1.2",
    "google-api-python-client>=2.125",
    "beautifulsoup4>=4.12",
    "lxml>=5.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/connectors"]
