[project]
name = "cli"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "core",
    "connectors",
    "typer>=0.12",
    "rich>=13.0",
    "httpx>=0.27",
    "textual>=0.60",
]

[project.scripts]
claw = "cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cli"]
